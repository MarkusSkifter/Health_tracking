# Local Postgres for development.
#   docker compose up -d
# Matches the DATABASE_URL in .env.example.
services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: health_tracking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_tracking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
